services:
  postgres:
    image: postgres:latest
    env_file:
      - .env
    environment:
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  db-populator:
    build: ./archnite-db-populator
    container_name: db-populator
    restart: always
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
       GO_DBCONN_URL: ${GO_DBCONN_URL}
       DOCKER_ENV: "true"
volumes:
  postgres_data:
