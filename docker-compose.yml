services:
  postgres:
    image: postgres:latest
    env_file:
      - .env
    environment:
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      retries: 5
      timeout: 3s

  db-populator:
    build: ./archnite-db-populator
    container_name: db-populator
    restart: always
    depends_on:
       postgres:
          condition: service_healthy
    env_file:
      - .env
    environment:
       GO_DBCONN_URL: ${GO_DBCONN_URL}
       DOCKER_ENV: "true"

  spring:
    build: ./archnite-spring
    container_name: spring
    restart: always
    depends_on:
       postgres:
          condition: service_healthy
    env_file:
      - .env
    environment:
      DOCKER_ENV: "true"
    ports:
      - 8080:8080

volumes:
  postgres_data:
