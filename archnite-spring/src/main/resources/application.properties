spring.application.name=archnite
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.cache.type=jcache
spring.cache.jcache.provider=com.hazelcast.cache.impl.HazelcastServerCachingProvider
spring.main.allow-bean-definition-overriding=true
server.error.whitelabel.enabled=false
spring.web.resources.add-mappings=false

bucket4j.enabled=true
bucket4j.filter-config-caching-enabled=true

bucket4j.filters[0].id=globalFilter
bucket4j.filters[0].cache-name=buckets
bucket4j.filters[0].url=.*
bucket4j.filters[0].filter-method=servlet
bucket4j.filters[0].http-content-type=application/json
bucket4j.filters[0].http-status-code=TOO_MANY_REQUESTS
bucket4j.filters[0].http-response-body={ "message": "Too Many Requests" }
bucket4j.filters[0].strategy=first
bucket4j.filters[0].rate-limits[0].cache-key=getRemoteAddr()
bucket4j.filters[0].rate-limits[0].num-tokens=1
bucket4j.filters[0].rate-limits[0].bandwidths[0].capacity=180
bucket4j.filters[0].rate-limits[0].bandwidths[0].time=1
bucket4j.filters[0].rate-limits[0].bandwidths[0].unit=minutes
bucket4j.filters[0].rate-limits[0].bandwidths[0].refill-speed=greedy